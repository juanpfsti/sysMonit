<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento Veicular</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
</head>
<body>

<header>
  <h1>🚦 Sistema de Monitoramento</h1>

  <div class="filters">
    <select id="quickRange">
      <option value="5">Últimos 5m</option>
      <option value="10">Últimos 10m</option>
      <option value="30">Últimos 30m</option>
      <option value="60">Última 1h</option>
      <option value="1440">Últimas 24h</option>
      <option value="10080" selected>Últimos 7 dias</option>
    </select>

    <button onclick="exportExcel()">Exportar Excel</button>
    <button onclick="exportPDF()">Exportar PDF</button>
  </div>
</header>

<section class="dashboards">

  <div class="card">
    <h3>Resumo por Classe</h3>
    <canvas id="resumoChart"></canvas>
  </div>

  <div class="card">
    <h3>Evolução Temporal</h3>
    <select id="evolucaoSelect">
      <option value="hour">Por Hora</option>
      <option value="day">Por Dia</option>
    </select>
    <canvas id="evolucaoChart"></canvas>
  </div>

  <div class="card full">
    <h3>Heatmap (Date x Time)</h3>
    <canvas id="heatmapChart"></canvas>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
